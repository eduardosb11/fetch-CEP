<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch CEP</title>
    <script src="scripts.js" defer></script>
</head>

<body>
    <form>
        <h1>Cadastro de usuário</h1>
        
        <label for="nome">
            <p>Nome: <input type="text" name="nome" id="nome"></p>
        </label>
        <label for="cpf">
            <p>CPF: <input type="number" name="cpf" id="cpf"></p>
        </label>
        <label for="cep">
            <p>CEP: <input type="number" name="cep" id="cep"></p>
        </label>
        <label for="bairro">
            <p>Bairro: <input type="text" name="bairro" id="bairro"></p>
        </label>
        <label for="localidade">
            <p>Localidade: <input type="text" name="localidade" id="localidade"></p>
        </label>
        <label for="estado">
            <p>Estado: <input type="text" name="estado" id="estado"></p>
        </label>
        
        <input type="submit" value="Cadastrar">
    </form>
</body>

</html>
